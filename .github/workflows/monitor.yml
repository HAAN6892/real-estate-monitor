name: 부동산 모니터링

on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests

      - name: config.json 생성
        env:
          MY_API_KEY: ${{ secrets.API_KEY }}
          MY_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MY_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MY_KAKAO_KEY: ${{ secrets.KAKAO_KEY }}
          MY_ODSAY_KEY: ${{ secrets.ODSAY_KEY }}
        run: |
          python3 << 'EOF'
          import json, os
          config = {
              "api_key": os.environ["MY_API_KEY"],
              "telegram": {
                  "bot_token": os.environ["MY_BOT_TOKEN"],
                  "chat_id": os.environ["MY_CHAT_ID"]
              },
              "kakao_key": os.environ["MY_KAKAO_KEY"],
              "odsay_key": os.environ.get("MY_ODSAY_KEY", ""),
              "filters": {
                  "min_area": 49,
                  "max_area": 99,
                  "min_price": 0,
                  "max_price": 60000,  # 정책대출(디딤돌·보금자리론 신혼) 주택가격 상한 기준
                  "min_floor": 1,
                  "max_build_year": 9999,
                  "min_households": 200,
                  "max_days_ago": 30,
                  "rent": {
                      "min_deposit": 0,
                      "max_deposit": 50000,
                      "type": "all",
                      "max_days_ago": 30
                  }
              },
              "regions": [
                  {"name": "서울 노원구", "code": "11350", "sgg_name": "서울 노원구"},
                  {"name": "서울 도봉구", "code": "11320", "sgg_name": "서울 도봉구"},
                  {"name": "서울 강북구", "code": "11305", "sgg_name": "서울 강북구"},
                  {"name": "서울 중랑구", "code": "11260", "sgg_name": "서울 중랑구"}
              ],
              "schedule": {
                  "run_times": ["08:00", "20:00"]
              }
          }
          with open("config.json", "w", encoding="utf-8") as f:
              json.dump(config, f, ensure_ascii=False, indent=2)
          print("config.json 생성 완료")
          print(f"지역: {len(config['regions'])}개")
          EOF

      - name: 모니터링 실행
        run: python main.py

      - name: 출퇴근 소요시간 업데이트
        run: python commute_update.py
        continue-on-error: true

      - name: 데이터 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json data-rent.json sent_history.json sent_history_rent.json coord_cache.json apt_info_cache.json commute_time.json flagship_history.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "📊 데이터 업데이트 $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main || true
          git push || true
